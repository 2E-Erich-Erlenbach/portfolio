    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --accent-color: #d4af37;
            --glass-blur: blur(25px) saturate(180%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }

        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=1920');
            background-size: cover;
            background-position: center;
        }

        header {
            position: fixed;
            top: 0; width: 100%; height: 55px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            z-index: 1001;
            border-bottom: var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lang-nav {
            display: flex; gap: 4px;
            background: rgba(255,255,255,0.1);
            padding: 4px; border-radius: 99px;
        }

        .lang-btn {
            background: transparent; border: none;
            color: var(--text-muted); font-size: 11px; font-weight: 700;
            padding: 6px 14px; cursor: pointer; border-radius: 99px;
            transition: var(--transition);
        }

        .lang-btn.active { background: var(--accent-color); color: #000; }

        .top-info-bar {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 1100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 30px; background: rgba(255, 255, 255, 0.04);
            backdrop-filter: var(--glass-blur); border: var(--glass-border);
            border-radius: 22px; z-index: 1000;
        }

        #clock-time { font-size: 1.4rem; font-weight: 600; color: var(--accent-color); line-height: 1; }
        #clock-date { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }

        section { padding: 180px 20px 100px; max-width: 1100px; margin: 0 auto; }
        h2 { font-family: 'Cinzel', serif; font-size: 38px; margin-bottom: 60px; text-align: center; color: var(--accent-color); letter-spacing: 3px; }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 5.5rem); color: var(--accent-color); margin-bottom: 10px; letter-spacing: 5px; }
        .hero p { font-size: 1.1rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }

        .manifesto-box {
            max-width: 900px; padding: 50px; background: rgba(255, 255, 255, 0.03);
            border: var(--glass-border); backdrop-filter: var(--glass-blur);
            border-radius: 35px; text-align: center;
        }

        #quote-text { font-size: 1.2rem; font-style: italic; min-height: 100px; margin-bottom: 30px; color: #fff; line-height: 1.8; }

        .btn-quote {
            background: transparent; border: 1.5px solid var(--accent-color);
            color: var(--accent-color); padding: 12px 30px; border-radius: 99px;
            cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px; transition: var(--transition);
        }
        .btn-quote:hover { background: var(--accent-color); color: #000; }

        .bio-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 50px; align-items: start; }
        .bio-img { width: 100%; border-radius: 30px; border: var(--glass-border); }
        
        .bio-content h3 { color: var(--accent-color); font-family: 'Cinzel', serif; margin-bottom: 20px; font-size: 1.8rem; }
        .bio-content h4 { color: var(--accent-color); margin: 30px 0 10px; font-size: 1.2rem; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: inline-block; }
        .bio-content p { margin-bottom: 15px; text-align: justify; }
        .bio-content ul { list-style: none; margin: 20px 0; }
        .bio-content ul li { position: relative; padding-left: 25px; margin-bottom: 8px; }
        .bio-content ul li::before { content: '◈'; position: absolute; left: 0; color: var(--accent-color); }

        .quote-block { 
            border-left: 4px solid var(--accent-color); padding: 20px 30px; margin: 30px 0; 
            font-style: italic; background: rgba(212, 175, 55, 0.05); border-radius: 0 20px 20px 0; color: #fff;
        }

        .links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card {
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px;
            text-align: center; border: var(--glass-border); transition: var(--transition);
            text-decoration: none; color: #fff; font-weight: 500;
        }
        .card:hover { background: #fff; color: #000; transform: translateY(-5px); }

        .contact-section { text-align: center; border-top: var(--glass-border); padding-top: 100px; }
        .contact-item { color: var(--accent-color); text-decoration: none; font-size: 1.5rem; font-family: 'Cinzel', serif; display: block; margin: 30px 0; }

        .banners-container {
            margin-top: 50px; display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; padding-bottom: 80px;
        }

        .litres-logo-box {
            width: 88px; height: 31px; background: #ff6600; display: flex; align-items: center; justify-content: center;
            border-radius: 2px; border: 1px solid rgba(255, 255, 255, 0.2); transition: var(--transition);
        }
        .litres-logo-box:hover { transform: scale(1.05); }
        .litres-logo-text { color: #fff; font-family: Arial, sans-serif; font-weight: bold; font-size: 12px; }

        body.rtl { direction: rtl; text-align: right; }
        body.rtl .quote-block { border-left: none; border-right: 4px solid var(--accent-color); border-radius: 20px 0 0 20px; }
        body.rtl .bio-content ul li { padding-left: 0; padding-right: 25px; }
        body.rtl .bio-content ul li::before { left: auto; right: 0; }

        @media (max-width: 850px) {
            .bio-grid { grid-template-columns: 1fr; }
            .top-info-bar { flex-direction: column; top: 110px; text-align: center; height: auto; padding: 15px; }
            section { padding-top: 280px; }
        }
    </style>
</head>

                    <div class="quote-block">“任何以声音、韵律或散文形式呈现的事物，都只是上苍和谐的凡间回响。”</div>
                    <h4>传记与根源</h4>
                    <p>埃里希·埃尔伦巴赫 1962 年出生于第比利斯。他的血统融合了七个民族和三种宗教。</p>
                    <ul>
                        <li>接受过音乐、象棋和舞蹈教育。</li>
                        <li>服役 40 余年，退役上校。俄罗斯作家协会成员。</li>
                    </ul>
                `,
                quotes: ["音乐是混沌与秩序之间唯一的桥梁。"]
            }
        };

        let currentLang = 'ru';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('ru-RU');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('clock-date').innerText = now.toLocaleDateString(translations[currentLang].locale, options);
        }

        function changeLang(lang) {
            currentLang = lang;
            const data = translations[lang];
            document.getElementById('hero-title').innerText = data.title;
            document.getElementById('hero-subtitle').innerText = data.subtitle;
            document.getElementById('about-title').innerText = data.about;
            document.getElementById('music-title').innerText = data.music;
            document.getElementById('lit-title').innerText = data.lit;
            document.getElementById('contact-title').innerText = data.contacts;
            document.getElementById('bio-content').innerHTML = data.bio;
            document.getElementById('btn-quote-text').innerText = data.quoteBtn;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            document.body.classList.toggle('rtl', lang === 'ar');
            updateClock();
            showRandomQuote();
        }

        function showRandomQuote() {
            const q = translations[currentLang].quotes;
            document.getElementById('quote-text').innerText = `«${q[Math.floor(Math.random()*q.length)]}»`;
        }

        setInterval(updateClock, 1000);
        window.onload = () => changeLang('ru');
    </script>
</body>
</html>
