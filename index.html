<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Erich Erlenbach | Official Site</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGJRX8JFGF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #000; --ios-card: rgba(28, 28, 30, 0.7);
            --ios-accent: #d4af37; --ios-text: #fff;
            --ios-secondary: #8e8e93; --blur: blur(25px) saturate(180%);
            --border: 0.5px solid rgba(255, 255, 255, 0.15); --radius: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--ios-bg); color: var(--ios-text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; overflow-x: hidden; }
        
        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
            url('https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=1920');
            background-size: cover; background-position: center;
        }

        header {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            height: 44px; background: rgba(0, 0, 0, 0.8); backdrop-filter: var(--blur);
            border-radius: 22px; z-index: 2000; border: var(--border); display: flex; align-items: center; padding: 0 8px;
        }
        .lang-btn { background: transparent; border: none; color: var(--ios-secondary); font-size: 11px; font-weight: 700; padding: 8px 12px; cursor: pointer; border-radius: 18px; transition: 0.3s; }
        .lang-btn.active { background: var(--ios-accent); color: #000; }

        .status-panel { margin: 100px auto 0; padding: 0 25px; max-width: 900px; display: flex; justify-content: space-between; align-items: flex-end; }
        #clock-time { font-size: 4rem; font-weight: 200; letter-spacing: -2px; line-height: 1; }
        #clock-date { font-size: 1.1rem; font-weight: 500; color: var(--ios-accent); margin-bottom: 10px; }

        .widget { background: var(--ios-card); backdrop-filter: var(--blur); border-radius: var(--radius); border: var(--border); padding: 25px; margin-bottom: 25px; max-width: 900px; margin-left: auto; margin-right: auto; }
        
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 3.5rem); color: var(--ios-accent); text-align: center; margin-bottom: 5px; }
        .hero p { text-align: center; color: var(--ios-accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.85rem; margin-bottom: 25px; }

        .bio-grid { display: flex; gap: 30px; align-items: start; flex-wrap: wrap; }
        .bio-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 3px solid var(--ios-accent); flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bio-content { flex: 1; min-width: 300px; }
        .bio-content h3 { font-family: 'Cinzel', serif; color: var(--ios-accent); margin-top: 20px; margin-bottom: 10px; font-size: 1.3rem; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 3px; }
        .bio-content p { margin-bottom: 15px; text-align: justify; font-size: 1rem; color: #f2f2f7; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .app-link { background: rgba(255,255,255,0.08); border: var(--border); border-radius: 15px; padding: 18px 10px; text-align: center; text-decoration: none; color: #fff; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .app-link:active { transform: scale(0.95); }

        h2 { font-size: 1rem; color: var(--ios-accent); text-transform: uppercase; margin: 40px 0 15px 15px; letter-spacing: 1px; font-weight: 700; }
        
        .footer { text-align: center; padding: 60px 20px; border-top: var(--border); margin-top: 40px; }
        .footer-banners { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; align-items: center; }
        
        .litres-banner {
            display: inline-flex; align-items: center; justify-content: center;
            width: 88px; height: 31px; background: #fff; color: #fb5105; 
            text-decoration: none; font-weight: 900; font-size: 14px; 
            border-radius: 4px; font-family: Arial, sans-serif; transition: 0.3s;
        }
        .litres-banner:hover { transform: scale(1.05); filter: brightness(1.1); }
        .footer-banners img { border-radius: 4px; transition: 0.3s; }
        .footer-banners img:hover { transform: scale(1.05); }
        
        body.rtl { direction: rtl; text-align: right; }

        @media (max-width: 600px) { 
            .status-panel { flex-direction: column; align-items: center; text-align: center; } 
            .bio-grid { justify-content: center; text-align: center; }
            .bio-content p { text-align: center; }
            #weather-box { margin-top: 10px; text-align: center; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="wallpaper"></div>
    <header>
        <div class="lang-nav">
            <button class="lang-btn" id="btn-ru" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" id="btn-en" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" id="btn-de" onclick="changeLang('de')">DE</button>
            <button class="lang-btn" id="btn-ka" onclick="changeLang('ka')">KA</button>
            <button class="lang-btn" id="btn-ar" onclick="changeLang('ar')">AR</button>
            <button class="lang-btn" id="btn-zh" onclick="changeLang('zh')">ZH</button>
        </div>
    </header>

    <div class="status-panel">
        <div><div id="clock-date">...</div><div id="clock-time">00:00</div></div>
        <div id="weather-box" style="min-width: 150px;"></div>
    </div>

    <main style="max-width: 900px; margin: 0 auto; padding: 0 15px;">
        <div class="hero">
            <h1 id="hero-title">Эрих Эрлэнбах</h1>
            <p id="hero-subtitle">Поэт • Писатель • Философ • Композитор</p>
        </div>

        <div class="widget" style="text-align: center;">
            <div id="quote-text" style="font-style: italic; color: var(--ios-secondary); margin-bottom: 15px; font-size: 1.1rem;"></div>
            <button style="background: var(--ios-accent); border: none; padding: 10px 25px; border-radius: 12px; font-weight: 700; cursor: pointer;" onclick="getRandomQuote()">Цитата</button>
        </div>

        <h2 id="sec-bio">Биография</h2>
        <div class="widget">
            <div class="bio-grid">
                <img src="sheridan1.jpg" class="bio-img" alt="Эрих Эрлэнбах">
                <div class="bio-content" id="bio-text"></div>
            </div>
        </div>

        <h2 id="sec-media">Медиатека</h2>
        <div class="widget">
            <div class="app-grid">
                <a href="https://open.spotify.com/artist/your-link" class="app-link" target="_blank" style="border-color: #1DB954;">Spotify</a>
                <a href="https://music.yandex.ru/artist/25156828" class="app-link" target="_blank">Yandex Music</a>
                <a href="https://vk.com/artist/8133192430738481080" class="app-link" target="_blank">VK Music</a>
                <a href="https://music.apple.com/ru/artist/erich-erlenbach/1864018567" class="app-link" target="_blank">Apple Music</a>
                <a href="https://music.amazon.de/artists/B0GBVXPCMR/erich-erlenbach" class="app-link" target="_blank">Amazon Music</a>
                <a href="https://youtube.com/@ericherlenbach" class="app-link" target="_blank">YouTube</a>
                <a href="https://rutube.ru/u/2e/" class="app-link" target="_blank">RuTube</a>
            </div>
        </div>

        <h2 id="sec-lit">Литература</h2>
        <div class="widget">
            <div class="app-grid">
                <a href="https://stihi.ru/avtor/sheridan2" class="app-link" target="_blank">Стихи.ру</a>
                <a href="https://proza.ru/avtor/sheridan1" class="app-link" target="_blank">Проза.ру</a>
                <a href="https://www.litres.ru/author/erih-erlenbah/" class="app-link" target="_blank">ЛитРес</a>
                <a href="https://www.amazon.com/s?k=Erich+Erlenbach" class="app-link" target="_blank">Amazon Books</a>
                <a href="https://www.google.nl/books/edition/_/0AWaEQAAQBAJ" class="app-link" target="_blank">Google Books</a>
            </div>
        </div>

        <div class="footer">
            <a href="mailto:d.a.tretiakof@gmail.com" style="color: var(--ios-accent); text-decoration: none; font-size: 1.3rem; font-weight: 700;">d.a.tretiakof@gmail.com</a>
            <div class="footer-banners">
                <a href="https://www.litres.ru/author/erih-erlenbah/" target="_blank" class="litres-banner">ЛитРес</a>
                <a href="https://proza.ru/avtor/sheridan1" target="_blank">
                    <img src="https://proza.ru/images/author88x31.gif" width="88" height="31" alt="Проза.ру">
                </a>
                <a href="https://stihi.ru/avtor/sheridan2" target="_blank">
                    <img src="https://stihi.ru/images/author88x31.gif" width="88" height="31" alt="Стихи.ру">
                </a>
            </div>
        </div>
    </main>

    <script>
        const translations = {
            ru: {
                title: "Эрих Эрлэнбах", subtitle: "Поэт • Писатель • Философ • Композитор",
                secBio: "Биография", secMedia: "Медиатека", secLit: "Литература", locale: "ru-RU",
                bio: `<h3>Истоки и Синтез</h3><p>Эрих Эрлэнбах родился в 1962 году в Тбилиси в семье оперных артистов. Его родословная — это уникальное сплетение семи наций и трёх религий, объединившее Кавказ, Европу и немцев Поволжье. Выросший в атмосфере знаменитых "итальянских двориков" Тифлиса, он впитал культуру многоголосия и гармоничного сосуществования, что стало фундаментом его мировоззрения.</p>
                <h3>Путь Служения</h3><p>Более 40 лет Эрих посвятил службе в войсках (полковник в отставке). Параллельно с военной карьерой он на протяжении полувека выстраивал свою художественную вселенную, получив разностороннее образование: от музыкальной и шахматной школ до хореографического училища и боевых искусств.</p>
                <h3>Метапроект</h3><p>Творчество Эрлэнбаха — это единое полотно, где музыка, стих и проза являются гранями одного откровения. Как композитор-полистилист и литератор, он соединяет строгую форму классики с концепциями квантовой физики и библейскими сюжетами. Автор более 20 изданных книг и десятков музыкальных опусов (симфоний, кантат, EDM), он рассматривает искусство не как профессию, а как высший способ познания жизни.</p>`
            },
            en: {
                title: "Erich Erlenbach", subtitle: "Poet • Writer • Philosopher • Composer",
                secBio: "Biography", secMedia: "Media Library", secLit: "Literature", locale: "en-US",
                bio: `<h3>Origins & Synthesis</h3><p>Born in 1962 in Tbilisi to opera singers, Erich Erlenbach's heritage unites seven nations and three religions. Growing up in the "Italian courtyards" of Tiflis, he embraced a culture of harmony that became the cornerstone of his philosophy.</p>
                <h3>Path of Service</h3><p>Erich served in the military for over 40 years (retired Colonel). Alongside his career, he developed an artistic universe for half a century, educated in music, chess, choreography, and martial arts.</p>
                <h3>Meta-Project</h3><p>His work is a unified canvas where music, poetry, and prose are facets of one revelation. He blends classical forms with quantum physics and biblical motifs. Author of 20+ books and dozens of musical works.</p>`
            },
            de: {
                title: "Erich Erlenbach", subtitle: "Dichter • Schriftsteller • Philosoph • Komponist",
                secBio: "Biografie", secMedia: "Mediathek", secLit: "Literatur", locale: "de-DE",
                bio: `<h3>Ursprung & Synthese</h3><p>Geboren 1962 in Tiflis als Sohn von Opernsängern. Seine Herkunft vereint sieben Nationen und drei Religionen. Das Aufwachsen in den "italienischen Höfen" von Tiflis prägte sein harmonisches Weltbild.</p>
                <h3>Dienstweg</h3><p>Über 40 Jahre Dienst beim Militär (Oberst a.D.). Gleichzeitig schuf er über 50 Jahre lang sein künstlerisches Universum, ausgebildet in Musik, Schach, Choreografie und Kampfkunst.</p>
                <h3>Das Metaprojekt</h3><p>Sein Schaffen ist ein Gesamtkunstwerk, in dem Musik und Literatur verschmelzen. Als Komponist und Autor verbindet er klassische Formen mit Quantenphysik und biblischen Themen. Autor von über 20 Büchern.</p>`
            },
            ka: {
                title: "ერიხ ერლენბახი", subtitle: "პოეტი • მწერალი • ფილოსოფოსი • კომპოზიტორი",
                secBio: "ბიოგრაფია", secMedia: "მედიათეკა", secLit: "ლიტერატურა", locale: "ka-GE",
                bio: `<h3>საწყისები და სინთეზი</h3><p>ერიხ ერლენბახი დაიბადა 1962 წელს თბილისში, ოპერის მომღერლების ოჯახში. მისი წარმომავლობა შვიდ ერსა და სამ რელიგიას აერთიანებს. თბილისურ "იტალიურ ეზოებში" გატარებულმა ბავშვობამ მასში კულტურათა ჰარმონიული თანაარსებობის განცდა ჩამოაყალიბა.</p>
                <h3>მსახურების გზა</h3><p>ერიხმა 40 წელზე მეტი სამხედრო სამსახურს მიუძღვნა (თადარიგის პოლკოვნიკი). პარალელურად, იგი 50 წლის განმავლობაში ქმნიდა თავის მხატვრულ სამყაროს. მას აქვს მრავალმხრივი განათლება: მუსიკალური, საჭადრაკო და ქორეოგრაფიული.</p>
                <h3>მეტაპროექტი</h3><p>ერლენბახის შემოქმედება ერთიანი ტილოა, სადაც მუსიკა და პოეზია ერთმანეთს ავსებს. იგი აერთიანებს კლასიკურ ფორმებს კვანტურ ფიზიკასთან და ბიბლიურ სიუჟეტებთან. 20-ზე მეტი წიგნის ავტორი.</p>`
            },
            ar: {
                title: "إريش إرلنباخ", subtitle: "شاعر • كاتب • فيلسوف • ملحن",
                secBio: "السيرة الذاتية", secMedia: "المكتبة", secLit: "الأدب", locale: "ar-SA",
                bio: `<h3>الأصول والتركيب</h3><p>ولد عام 1962 في تبليسي لعائلة من فناني الأوبرا. يجمع نسبه بين سبع أمم وثلاث ديانات. نشأ في بيئة تكرس التناغم والحوار بين الثقافات.</p>
                <h3>طريق الخدمة</h3><p>كرس أكثر من 40 عاماً للخدمة العسكرية (عقيد متقاعد). بالتوازي مع مسيرته العسكرية، بنى كونه الفني على مدار نصف قرн.</p>
                <h3>المشروع الجامع</h3><p>عمله يمزج بين الأشكال الكلاسيكية ومفاهيم الفيزياء الكوانتية والقصص الكتابية. مؤلف لأكثر من 20 كتاباً وعشرات الأعمال الموسيقية.</p>`
            },
            zh: {
                title: "埃里希·埃尔伦巴赫", subtitle: "诗人 • 作家 • 哲学家 • 作曲家",
                secBio: "传记", secMedia: "媒体库", secLit: "文学", locale: "zh-CN",
                bio: `<h3>起源与综合</h3><p>1962年出生于第比利斯歌剧世家。他的血统融合了七个民族和三种宗教。他在军队服役超过40年（退役上校）。</p>
                <h3>服役之路</h3><p>在职业生涯的同时， he 用了半个世纪的时间构建艺术宇宙，涵盖了音乐、国际象棋、舞蹈和武术教育。</p>
                <h3>宏大项目</h3><p>作为一名多元风格的作曲家和文学家，他将古典形式与量子物理及圣经主题相结合。出版书籍20余部。</p>`
            }
        };

        const kaMonths = ["იანვარი", "თებერვალი", "მარტი", "აპრილი", "მაისი", "ივნისი", "ივლისი", "აგვისტო", "სექტემბერი", "ოქტომბერი", "ნოემბერი", "დეკემბერი"];
        const kaDays = ["კვირა", "ორშაბათი", "სამშაბათი", "ოთხშაბათი", "ხუთშაბათი", "პარასკევი", "შაბათი"];
        const quotes = ["Всё, что обретает форму в звуке, в рифме или в прозе, есть лишь земное эхо Небесной гармонии.", "Музыка, стих и проза — три грани единого откровения.", "Творчество — это не профессия, а способ познания жизни."];

        let currentLang = 'ru';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            if (currentLang === 'ka') {
                document.getElementById('clock-date').innerText = kaDays[now.getDay()] + ", " + now.getDate() + " " + kaMonths[now.getMonth()];
            } else {
                document.getElementById('clock-date').innerText = now.toLocaleDateString(translations[currentLang].locale, { weekday: 'long', month: 'long', day: 'numeric' });
            }
        }

        function changeLang(lang) {
            currentLang = lang;
            const data = translations[lang];
            document.getElementById('hero-title').innerText = data.title;
            document.getElementById('hero-subtitle').innerText = data.subtitle;
            document.getElementById('sec-bio').innerText = data.secBio;
            document.getElementById('sec-media').innerText = data.secMedia;
            document.getElementById('sec-lit').innerText = data.secLit;
            document.getElementById('bio-text').innerHTML = data.bio;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            document.body.classList.toggle('rtl', lang === 'ar');
            updateClock();
        }

        function getRandomQuote() { document.getElementById('quote-text').innerText = `«${quotes[Math.floor(Math.random() * quotes.length)]}»`; }
        
        // НОВАЯ ИСПРАВЛЕННАЯ ФУНКЦИЯ ПОГОДЫ
        function loadWeather() { 
            const weatherBox = document.getElementById('weather-box');
            weatherBox.innerHTML = `
                <a class="weatherwidget-io" href="https://forecast7.com/ru/41base7244base83/tbilisi/" 
                   data-label_1="ТБИЛИСИ" data-label_2="ПОГОДА" data-font="Arial" 
                   data-icons="Climacons Animated" data-mode="Current" data-theme="pure" 
                   data-basecolor="rgba(0,0,0,0)" data-accent="rgba(0,0,0,0)" 
                   data-textcolor="#d4af37" data-highcolor="#d4af37" data-lowcolor="#8e8e93">ТБИЛИСИ ПОГОДА</a>`;
            
            // Инициализация скрипта виджета
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        }

        setInterval(updateClock, 1000);
        window.onload = () => { changeLang('ru'); getRandomQuote(); loadWeather(); };
    </script>
</body>
</html>
