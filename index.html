                wLoading: "🌤️ 加载中...", wError: "⚠️ 错误", wDesc: "当前天气", wWind: "米/秒",
                bio: `<h3>起源与综合</h3><p>1962年出生于第比利斯歌剧世家。他的血统融合了七个民族和三种宗教。</p>
                <h3>服役之路</h3><p>在军队服役超过40年（退役上校）。他用了半个世纪的时间构建艺术宇宙，涵盖了音乐、国际象棋、舞蹈、马术、高山滑雪和武术教育。</p>
                <h3>宏大项目</h3><p>作为一名多元风格 of 作曲家和文学家，他将古典形式与量子物理及圣经主题相结合。</p>`
            }
        };

        const kaMonths = ["იანვარი", "თებერვალი", "მარტი", "აპრილი", "მაისი", "ივნისი", "ივლისი", "აგვისტო", "სექტემბერი", "ოქტომბერი", "ნოემბერი", "დეკემბერი"];
        const kaDays = ["კვირა", "ორშაბათი", "სამშაბათი", "ოთხშაბათი", "ხუთშაბათი", "პარასკევი", "შაბათი"];
        const quotes = ["Всё, что обретает форму в звуке, в рифме или в прозе, есть лишь земное эхо Небесной гармонии.", "Музыка, стих и проза — три грани единого откровения.", "Творчество — это не профессия, а способ познания жизни."];

        let currentLang = 'ru';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            if (currentLang === 'ka') {
                document.getElementById('clock-date').innerText = kaDays[now.getDay()] + ", " + now.getDate() + " " + kaMonths[now.getMonth()];
            } else {
                document.getElementById('clock-date').innerText = now.toLocaleDateString(translations[currentLang].locale, { weekday: 'long', month: 'long', day: 'numeric' });
            }
        }

        async function fetchWeather() {
            const weatherLoading = document.getElementById('weatherLoading'), weatherContent = document.getElementById('weatherContent'), weatherError = document.getElementById('weatherError');
            const weatherTemp = document.getElementById('weatherTemp'), weatherDesc = document.getElementById('weatherDesc'), weatherHumidity = document.getElementById('weatherHumidity'), weatherWind = document.getElementById('weatherWind');
            const lang = translations[currentLang];
            
            weatherLoading.innerText = lang.wLoading;
            weatherError.innerText = lang.wError;

            try {
                const resp = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.7151&longitude=44.8271&current_weather=true&hourly=relativehumidity_2m&timezone=auto');
                if(!resp.ok) throw new Error();
                const data = await resp.json();
                if(data.current_weather) {
                    weatherTemp.innerHTML = `🌡️ ${Math.round(data.current_weather.temperature)}°C`;
                    weatherDesc.innerHTML = lang.wDesc;
                    
                    let humidity = '—';
                    if(data.hourly && data.hourly.relativehumidity_2m) {
                        humidity = data.hourly.relativehumidity_2m[0];
                    }
                    weatherHumidity.innerHTML = humidity; 
                    weatherWind.innerHTML = Math.round(data.current_weather.windspeed) + " " + lang.wWind;
                    
                    weatherLoading.style.display = 'none'; weatherContent.style.display = 'block'; weatherError.style.display = 'none';
                } else throw new Error();
            } catch(e) { 
                weatherLoading.style.display = 'none'; weatherContent.style.display = 'none'; weatherError.style.display = 'block'; 
            }
        }

        function changeLang(lang) {
            currentLang = lang;
            const data = translations[lang];
            document.getElementById('hero-title').innerText = data.title;
            document.getElementById('hero-subtitle').innerText = data.subtitle;
            document.getElementById('sec-bio').innerText = data.secBio;
            document.getElementById('sec-media').innerText = data.secMedia;
            document.getElementById('sec-lit').innerText = data.secLit;
            document.getElementById('bio-text').innerHTML = data.bio;
            document.getElementById('btn-quote').innerText = data.btnQuote;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            document.body.classList.toggle('rtl', lang === 'ar' || lang === 'he');
            
            updateClock();
            fetchWeather(); // Обновляем текст погоды при смене языка
        }

        function getRandomQuote() { document.getElementById('quote-text').innerText = `«${quotes[Math.floor(Math.random() * quotes.length)]}»`; }

        setInterval(updateClock, 1000);
        setInterval(fetchWeather, 30*60*1000); // Обновлять погоду каждые 30 минут

        window.onload = () => { 
            changeLang('ru'); 
            getRandomQuote(); 
        };
    </script>
</body>
</html>
