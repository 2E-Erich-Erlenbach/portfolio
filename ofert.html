            --ios-text: #1c1c1e;
            --ios-secondary: #3a3a3c;

            padding: 40px 20px;
            transition: background 0.5s ease, color 0.5s ease;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--ios-card);
            backdrop-filter: var(--blur);
            border-radius: var(--radius);
            border: var(--border);
            padding: 40px;
        }

        h1 { font-size: 2rem; }
        h2 { font-size: 1.3rem; margin-top: 30px; }
        p, li { margin-bottom: 15px; color: var(--ios-text); }
        ul { margin-left: 20px; margin-bottom: 20px; }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--ios-accent);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { opacity: 0.8; }
        .lang-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: var(--blur);
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
            border: var(--border);
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: var(--ios-secondary);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 18px;
            transition: 0.3s;
        }
        .lang-btn.active {
            background: var(--ios-accent);
            color: #000;
        }
        .lang-btn:hover { opacity: 0.8; }
        .theme-switch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--ios-card);
            backdrop-filter: var(--blur);
            border: var(--border);
            border-radius: 30px;

            cursor: pointer;
            color: var(--ios-accent);
            font-size: 0.8rem;
            z-index: 100;
        }

            `;
        }

        function changeLang(lang) {
            currentLang = lang;
            renderContent();
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.body.dir = (lang === 'ar' || lang === 'he') ? 'rtl' : 'ltr';
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => changeLang(btn.dataset.lang));
        });

        const themeSwitch = document.getElementById('themeSwitch');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        themeSwitch.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeSwitch.innerText = isLight ? '☀️ Светлая тема' : '🌓 Тёмная тема';
        });
        if (document.body.classList.contains('light-theme')) themeSwitch.innerText = '☀️ Светлая тема';
        else themeSwitch.innerText = '🌓 Тёмная тема';

        changeLang('ru');
    </script>
