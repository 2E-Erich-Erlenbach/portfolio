                section5_title: "5. データの保存と保護",
                section5_text: "5.1. 運営者は、個人データへの不正アクセス、破壊、改ざん、ブロック、複製、配布から保護するために、必要な組織的・技術的措置を講じます。<br>5.2. ユーザーの個人データは、ロシア連邦の法律で別段の定めがない限り、その処理目的を達成するために必要な期間保存されます。",

                section8_text: "個人データの処理に関連するすべての質問は、<a href='mailto:d.a.tretiakof@gmail.com' style='color: var(--ios-accent);'>d.a.tretiakof@gmail.com</a> までお問い合わせください。",

        let currentLang = 'ru';

        function renderContent() {
            const t = translations[currentLang];
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <h1>${t.title}</h1>
                <p><strong>${t.operator}</strong><br>
                <strong>${t.inn}</strong><br>
                ${t.email}</p>
                <h2>${t.section1_title}</h2>
                <p>${t.section1_text}</p>
                <h2>${t.section2_title}</h2>
                <p>${t.section2_text}</p>
                <h2>${t.section3_title}</h2>
                <p>${t.section3_text}</p>
                <h2>${t.section4_title}</h2>
                <p>${t.section4_text}</p>
                <h2>${t.section5_title}</h2>
                <p>${t.section5_text}</p>
                <h2>${t.section6_title}</h2>
                <p>${t.section6_text}</p>
                <h2>${t.section7_title}</h2>
                <p>${t.section7_text}</p>
                <h2>${t.section8_title}</h2>
                <p>${t.section8_text}</p>
                <a href="https://2e-erich-erlenbach.github.io/portfolio" class="back-link">${t.back}</a>
            `;
        }

        function changeLang(lang) {
            currentLang = lang;
            renderContent();
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            document.body.dir = (lang === 'ar' || lang === 'he') ? 'rtl' : 'ltr';
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => changeLang(btn.dataset.lang));
        });

        // Тема (светлая/тёмная)
        const themeSwitch = document.getElementById('themeSwitch');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        themeSwitch.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeSwitch.innerText = isLight ? '☀️ Светлая тема' : '🌓 Тёмная тема';
        });
        if (document.body.classList.contains('light-theme')) themeSwitch.innerText = '☀️ Светлая тема';
        else themeSwitch.innerText = '🌓 Тёмная тема';

        // Инициализация
        changeLang('ru');
    </script>
</body>
</html>
